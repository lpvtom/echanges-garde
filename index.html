<!DOCTYPE html>
<html lang="fr">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">

<title>Échanges de garde</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#1e1e1e">

<style>

body{
    font-family: Arial, sans-serif;
    background:#1e1e1e;
    color:white;
    text-align:center;
    margin:0;
    padding:10px;
}

#logo{
    display:block;
    margin:10px auto;
    height:80px;
}

#calendar{
    display:grid;
    grid-template-columns: repeat(7,1fr);
    gap:5px;
    margin-top:10px;
}

.dayHeader{
    font-weight:bold;
    font-size:12px;
}

.day{
    background:white;
    color:black;
    padding:5px 0;
    border-radius:6px;
    font-size:14px;
    min-height:60px;
    display:flex;
    flex-direction:column;
    align-items:center;
    justify-content:flex-start;
    cursor:pointer;
    position:relative;
    touch-action: manipulation;
}

.selected{
    border:2px solid yellow;
    box-sizing:border-box;
}

table{
    width:100%;
    margin-top:15px;
    font-size:12px;
    border-collapse:collapse;
}

th,td{
    border:1px solid #999;
    padding:6px 8px;
    text-align:center;
}

button{
    padding:6px 8px;
    border:none;
    border-radius:6px;
    margin:2px;
    cursor:pointer;
}

.acceptBtn{background:#4CAF50;color:white;}
.cancelBtn{background:#ff4d4d;color:white;}

#monthSelector,#shiftType,#yearSelector{
    font-size:16px;
    padding:6px 10px;
    border-radius:6px;
    margin:5px;
    background:white;
    color:black;
}

.day div.indicator{
    border-radius:4px;
    padding:2px 4px;
    margin-top:2px;
    font-size:10px;
    color:white;
}

.jour.indicator{background:#4CAF50;}
.nuit.indicator{background:#3b6cff;}
.garde24.indicator{background:#ff4d4d;}
.accepted.indicator{background:#ffcc66;color:black;}

.day.new-request .indicator{
    transform:scale(1.2);
}

/* MOBILE */

@media(max-width:700px){

h2{font-size:20px;}

#logo{height:60px;}

.day{
    min-height:45px;
    font-size:12px;
}

.dayHeader{font-size:11px;}

.day div.indicator{
    font-size:9px;
}

select{
    width:90%;
    display:block;
    margin:5px auto;
}

table{font-size:11px;}

th,td{padding:4px;}

button{
    font-size:11px;
    padding:5px 6px;
}

}

</style>
</head>

<body>

<h2>Échanges de garde</h2>

<img src="assets/ma-fond.jpg" id="logo">

<select id="yearSelector"></select>
<select id="monthSelector"></select>

<select id="shiftType">
<option value="24h">24h</option>
<option value="12h-jour">12h jour</option>
<option value="12h-nuit">12h nuit</option>
</select>

<div id="calendar"></div>

<h3>Demandes</h3>

<table>
<thead>
<tr>
<th>Agent</th>
<th>Jour</th>
<th>Type</th>
<th>Contre</th>
<th>Accepté</th>
<th>Action</th>
</tr>
</thead>

<tbody id="requestsTable"></tbody>
</table>

<script>

const calendar=document.getElementById("calendar");
const monthSelector=document.getElementById("monthSelector");
const yearSelector=document.getElementById("yearSelector");
const requestsTable=document.getElementById("requestsTable");
const shiftType=document.getElementById("shiftType");

let agentName=localStorage.getItem("agentName");

if(!agentName){
agentName=prompt("Nom de l'agent")||"Agent";
localStorage.setItem("agentName",agentName);
}

let requests=JSON.parse(localStorage.getItem("requests"))||[];

let firstClick=null;
let firstDayNum=null;

const months=["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];
const days=["L","M","M","J","V","S","D"];

months.forEach((m,i)=>{
let opt=document.createElement("option");
opt.value=i;
opt.textContent=m;
monthSelector.appendChild(opt);
});

for(let y=2025;y<=2030;y++){
let opt=document.createElement("option");
opt.value=y;
opt.textContent=y;
yearSelector.appendChild(opt);
}

function formatISO(y,m,d){
return `${y}-${String(m+1).padStart(2,"0")}-${String(d).padStart(2,"0")}`;
}

function formatDate(dateStr){
const parts=dateStr.split("-");
return `${parts[2]}/${parts[1]}/${parts[0]}`;
}

function updateTable(){

requestsTable.innerHTML="";

requests.forEach((r,index)=>{

let tr=document.createElement("tr");

tr.innerHTML=`
<td>${r.agent}</td>
<td>${formatDate(r.day)}</td>
<td>${r.type}</td>
<td>${formatDate(r.exchange)}</td>
<td>${r.accepted? r.acceptedBy:""}</td>
<td></td>
`;

let actionCell=tr.children[5];

if(!r.accepted && r.agent!==agentName){

let btn=document.createElement("button");
btn.textContent="Accepter";
btn.className="acceptBtn";

btn.onclick=()=>{

r.accepted=true;
r.acceptedBy=agentName;

save();
updateTable();

};

actionCell.appendChild(btn);

}

if(r.agent===agentName){

let btn=document.createElement("button");
btn.textContent="Annuler";
btn.className="cancelBtn";

btn.onclick=()=>{

requests.splice(index,1);

save();
updateTable();

};

actionCell.appendChild(btn);

}

requestsTable.appendChild(tr);

});

paintCalendar();

}

function save(){

localStorage.setItem("requests",JSON.stringify(requests));

}

function paintCalendar(){

document.querySelectorAll(".day").forEach(day=>{

const num=parseInt(day.dataset.day);

day.className="day";
day.innerHTML=`<div>${num}</div>`;

if(firstClick){

const fcDate=new Date(firstClick);

if(fcDate.getDate()===num){

day.classList.add("selected");

}

}

const month=parseInt(monthSelector.value);
const year=parseInt(yearSelector.value);

const dayRequests=requests.filter(r=>{

const reqDate=new Date(r.day);
const exchDate=new Date(r.exchange);

return !r.accepted &&

(reqDate.getDate()===num ||
exchDate.getDate()===num);

});

dayRequests.forEach(r=>{

let colorClass="";
let text="";

if(r.type==="12h-jour"){colorClass="jour";text="J";}
if(r.type==="12h-nuit"){colorClass="nuit";text="N";}
if(r.type==="24h"){colorClass="garde24";text="24h";}

const indicator=document.createElement("div");

indicator.className=`indicator ${colorClass}`;

indicator.textContent=`${text} (${r.agent})`;

day.appendChild(indicator);

});

});

}

function generateCalendar(month,year){

calendar.innerHTML="";

days.forEach(d=>{
let el=document.createElement("div");
el.textContent=d;
el.className="dayHeader";
calendar.appendChild(el);
});

const firstDay=new Date(year,month,1).getDay();
const offset=(firstDay+6)%7;

for(let i=0;i<offset;i++)calendar.appendChild(document.createElement("div"));

const daysInMonth=new Date(year,month+1,0).getDate();

for(let d=1;d<=daysInMonth;d++){

let day=document.createElement("div");

day.className="day";
day.dataset.day=d;

day.onclick=()=>{

if(!firstClick){

firstClick=formatISO(year,month,d);
firstDayNum=d;

paintCalendar();

}else{

if(firstDayNum===d){

firstClick=null;
firstDayNum=null;
paintCalendar();
return;

}

if(Math.abs(d-firstDayNum)!==1){

alert("Seulement jour avant ou après");
return;

}

requests.push({

agent:agentName,
day:firstClick,
type:shiftType.value,
exchange:formatISO(year,month,d),
accepted:false

});

firstClick=null;

save();
updateTable();

}

};

calendar.appendChild(day);

}

paintCalendar();

}

const today=new Date();

yearSelector.value=today.getFullYear();
monthSelector.value=today.getMonth();

generateCalendar(today.getMonth(),today.getFullYear());
updateTable();

monthSelector.onchange=()=>generateCalendar(parseInt(monthSelector.value),parseInt(yearSelector.value));
yearSelector.onchange=()=>generateCalendar(parseInt(monthSelector.value),parseInt(yearSelector.value));

/* SERVICE WORKER */

if("serviceWorker" in navigator){

navigator.serviceWorker.register("service-worker.js");

}

</script>

</body>
</html>
